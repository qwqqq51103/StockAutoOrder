server:
  port: 8080

spring:
  application:
    name: stock-game-server

  web:
    resources:
      static-locations:
        - classpath:/static/
        - file:frontend/

  # ── MySQL 資料庫設定 ──────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/stockgame?useSSL=false&serverTimezone=Asia/Taipei&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ""
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update    # 自動建表/更新欄位（首次執行用 create，之後改 update）
    show-sql: false
    open-in-view: false      # 關閉 WARN: spring.jpa.open-in-view
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

  # ── H2 停用（改用 MySQL） ────────────────────────────────────────────────
  h2:
    console:
      enabled: false

# ── JWT 設定 ──────────────────────────────────────────────────────────────
jwt:
  secret: StockGame2025-SuperSecretKey-MustBeAtLeast256BitsForHS256Algorithm
  expiration-ms: 86400000     # 24 小時

# ── 股市遊戲設定 ──────────────────────────────────────────────────────────
game:
  initial-cash: 1000000.0    # 新玩家初始資金：100 萬
  tick-interval-ms: 1000     # 市場 tick 間隔（毫秒）
  stock-symbol: DEMO
  initial-price: 100.0
  ai-retail-count: 10
  ai-noise-count: 5

  admin:
    auto-create: true
    username: admin
    email: admin@stockgame.local
    password: admin123456

logging:
  level:
    com.stockgame: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
